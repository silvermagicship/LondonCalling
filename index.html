      londonReturn.splice(0, londonReturn.length,

    enforceAirConditioningRequirement();

    function quickHtml(items) {
      return `<div class="quick">${items.map(([k,v]) => `<div class="quick-card"><strong>${k}</strong><span>${v}</span></div>`).join("")}</div>`;
    }
    function optionFromTuple(tuple, idx) {
      const [title, badge, img, desc, meta, tags, hrefs, routes, env, over] = tuple;
      return { title: `${idx ? idx + "｜" : ""}${title}`, badge, img, desc, meta, tags, links: hrefs, routes, env, over, badgeClass: badge.includes("贵") ? "red" : (badge.includes("备选") || badge.includes("一般") || badge.includes("型") ? "warn" : "") };
    }
    function renderOption(o) {
      return `<article class="option ${o.over ? "over" : ""}">
        <div class="head">
          <div class="photo"><img src="${o.img}" alt="${o.title}"><div class="links">${o.links.map(([t,u]) => `<a href="${u}">${t}</a>`).join("")}</div></div>
          <div>
            <div class="title-row"><div><h2>${o.title}</h2><p>${o.desc}</p></div><span class="badge ${o.badgeClass || ""}">${o.badge}</span></div>
            <div class="meta">${o.meta.map(([k,v,c]) => `<div class="pill ${c || ""}"><b>${k}</b>${v}</div>`).join("")}</div>
            <div class="tags">${o.tags.map(([c,t]) => `<span class="tag ${c}">${t}</span>`).join("")}</div>
          </div>
        </div>
        <div class="body grid2">
          <div class="mini"><h3>交通</h3><div class="routes">${o.routes.map(([k,v]) => `<div class="route"><b>${k}</b>${v}</div>`).join("")}</div></div>
          <div class="mini"><h3>住宿环境、退房和费用</h3><p>${o.env}</p></div>
        </div>
      </article>`;
    }
    function renderChoices() {
      return `<div class="block"><div class="block-head"><h2>D1｜8/21 单人房候选</h2><p>这一晚只保留公开页面明确有空调的酒店。目标是好入住、第二天和三人段衔接省事；若 D2-D5 住 Euston / St Pancras 一带，D1 也住同区域最省拖箱。</p></div>
        <div class="cards">${d1Choices.map((item) => `<article class="choice"><img src="${item.img}" alt="${item.name}"><div class="choice-body"><h3>${item.name}</h3><p><b>参考价</b> ${item.price}</p><p><b>房型</b> ${item.room}</p><p><b>第二天拖箱</b> ${item.transfer}</p><p><b>退房/退款</b> ${item.refund}</p><p><a href="${item.link}">订房链接</a></p></div></article>`).join("")}</div></div>`;
    }

    document.querySelector("#londonSplit").innerHTML = quickHtml(summaries.londonSplit) + renderChoices() + splitOptions.map(renderOption).join("");
    document.querySelector("#londonAll").innerHTML = quickHtml(summaries.londonAll) + allLondon.map((x) => renderOption(optionFromTuple(x))).join("");
    document.querySelector("#manchester").innerHTML = quickHtml(summaries.manchester) + manchester.map((x, i) => renderOption(optionFromTuple(x, i + 1))).join("");
    document.querySelector("#londonReturn").innerHTML = quickHtml(summaries.londonReturn) + londonReturn.map((x, i) => renderOption(optionFromTuple(x, i + 1))).join("");

    const buttons = document.querySelectorAll(".tab-button");
    const panels = document.querySelectorAll(".panel");
    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        buttons.forEach((b) => b.classList.toggle("active", b === button));
        panels.forEach((panel) => panel.classList.toggle("active", panel.id === button.dataset.tab));
      });
    });
  </script>
